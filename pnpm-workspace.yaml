# Repo-root pnpm workspace — registers web/ as the single Node toolchain member,
# isolating it from the Go module at the root. (Beekeeper v1.3.0, Phase 11 / SITE-02)
packages:
  - 'web'

# Native postinstall build scripts are DENIED. A static export
# (output: 'export' + images.unoptimized) never invokes sharp's image-optimizer
# binary, and unrs-resolver ships prebuilt binaries — so denying these builds means
# no untrusted lifecycle scripts run on install (aligned with Beekeeper's own
# posture). The explicit `false` / ignore decisions resolve pnpm's build-approval
# gate, which otherwise aborts a non-interactive `pnpm install`.
allowBuilds:
  sharp: false

ignoredBuiltDependencies:
  - unrs-resolver

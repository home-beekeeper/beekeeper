# GoReleaser configuration for Beekeeper
#
# SFDF-01 (reproducible builds): mod_timestamp pins the build to the commit
# timestamp and -trimpath strips local paths, so a tagged release rebuilds
# byte-for-byte. SFDF-02 (Sigstore signing): the signs section uses cosign v3
# keyless OIDC to sign checksums.txt, with NO long-lived signing keys.
#
# SFDF-05 (Phase 7): SBOM via syft in CycloneDX format is configured below.
# SLSA Level 3 provenance attestation is generated by the GitHub Actions
# release workflow, not GoReleaser — see .github/workflows/release.yml.
version: 2

# before.hooks run once before any build. The eBPF bytecode generation is Linux-
# only; on macOS/Windows GoReleaser CI this step is skipped automatically because
# clang/libbpf are absent and the build-tagged linux files are excluded from those
# target GOOS builds. The loader stubs remain fail-closed when bytecode is absent
# (SLNX-02/04 — CI-generated bytecode only, never committed, never runtime-compiled).
before:
  hooks:
    - cmd: sh -c 'if [ "$(uname -s)" = "Linux" ]; then go generate ./internal/sentry/linux/...; fi'

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Reproducibility: stamp the build with the commit time, not the build time.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X github.com/bantuson/beekeeper/internal/version.Version={{.Version}}
      - -X github.com/bantuson/beekeeper/internal/version.Commit={{.Commit}}
      # Commit date, NOT the build wall-clock time.
      - -X github.com/bantuson/beekeeper/internal/version.Date={{.CommitDate}}
    binary: beekeeper

checksums:
  name_template: "checksums.txt"

# cosign v3 keyless signing of checksums.txt. Signing the checksum file
# transitively covers every released artifact. The OIDC identity is bound into
# the Sigstore certificate by the GitHub Actions workflow (id-token: write).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

# SFDF-05 (SBOM): syft-generated CycloneDX SBOM per archive. GoReleaser invokes
# syft after the archive is built. The CycloneDX format is required per
# CONTEXT.md locked decision; the default would be SPDX-JSON.
sboms:
  - id: beekeeper-sbom
    cmd: syft
    artifacts: archive
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "${artifact}.cdx.json"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

release:
  draft: false

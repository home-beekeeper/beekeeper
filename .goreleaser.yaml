# GoReleaser configuration for Beekeeper
#
# SFDF-01 (reproducible builds): mod_timestamp pins the build to the commit
# timestamp and -trimpath strips local paths, so a tagged release rebuilds
# byte-for-byte. SFDF-02 (Sigstore signing): the signs section uses cosign v3
# keyless OIDC to sign checksums.txt, with NO long-lived signing keys.
#
# SFDF-05 (Phase 7): SBOM via syft in CycloneDX format is configured below.
# SLSA Level 3 provenance attestation is generated by the GitHub Actions
# release workflow, not GoReleaser — see .github/workflows/release.yml.
version: 2

# before.hooks run once before any build. The eBPF bytecode generation is Linux-
# only; on macOS/Windows GoReleaser CI this step is skipped automatically because
# clang/libbpf are absent and the build-tagged linux files are excluded from those
# target GOOS builds. The loader stubs remain fail-closed when bytecode is absent
# (SLNX-02/04 — CI-generated bytecode only, never committed, never runtime-compiled).
#
# The generate is attempted but MUST NOT abort the release if the eBPF toolchain
# (clang/libbpf) is unavailable on the runner: the committed loader stubs are
# valid Go that fail closed at runtime when real bytecode is missing, so a release
# built against them is safe — it just ships a non-functional eBPF sentry on Linux,
# matching the current decoupled posture (.github/workflows/ebpf-kernel.yml is a
# manual workflow pending a runner-toolchain rebuild). Without this guard the very
# first signed release would hard-fail here on a runner without the eBPF toolchain.
before:
  hooks:
    - sh -c 'if [ "$(uname -s)" = "Linux" ]; then go generate ./internal/sentry/linux/... || echo "beekeeper release - eBPF generate unavailable (no clang/libbpf toolchain), building against committed fail-closed stubs"; fi'

builds:
  # The entrypoint is cmd/beekeeper/main.go, not the repo root. Without an
  # explicit main, GoReleaser builds "." (which has no main func) and fails
  # with no-main. binary: below sets the OUTPUT name; main: sets the SOURCE.
  - main: ./cmd/beekeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Reproducibility: stamp the build with the commit time, not the build time.
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X github.com/home-beekeeper/beekeeper/internal/version.Version={{.Version}}
      - -X github.com/home-beekeeper/beekeeper/internal/version.Commit={{.Commit}}
      # Commit date, NOT the build wall-clock time.
      - -X github.com/home-beekeeper/beekeeper/internal/version.Date={{.CommitDate}}
    # The Windows ETW Sentry transport (tekert/golang-etw) ships amd64 SSE2
    # assembly (utf16_amd64_SSE2_version3.s) that is NOT GOARCH-constrained by
    # filename, so it fails to assemble for windows/arm64 — and ETW on arm64 is
    # unsupported by that dependency regardless. Blocking CI only cross-compiles
    # amd64, so this surfaces only at release time (which also builds arm64). Drop
    # the windows/arm64 target; linux/darwin arm64 are pure Go and unaffected.
    ignore:
      - goos: windows
        goarch: arm64
    binary: beekeeper

checksum:
  name_template: "checksums.txt"

# cosign v3 keyless signing of checksums.txt. Signing the checksum file
# transitively covers every released artifact. The OIDC identity is bound into
# the Sigstore certificate by the GitHub Actions workflow (id-token: write).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

# SFDF-05 (SBOM): syft-generated CycloneDX SBOM per archive. GoReleaser invokes
# syft after the archive is built. The CycloneDX format is required per
# CONTEXT.md locked decision; the default would be SPDX-JSON.
sboms:
  - id: beekeeper-sbom
    cmd: syft
    artifacts: archive
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "${artifact}.cdx.json"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

release:
  # draft: true so the SLSA provenance job can upload multiple.intoto.jsonl to the
  # release BEFORE it is published. GitHub immutable releases freeze a published
  # release's assets, so every asset (binaries, checksums, cosign bundle, SBOMs,
  # provenance) must be attached while the release is still a draft. The release.yml
  # "publish" job flips the draft to published once provenance has landed.
  draft: true

name: eBPF / kernel-VM tests (manual)

# These Linux-only jobs were split out of the main CI workflow because they
# depend on a toolchain that does not work on the GitHub-hosted runners as-is
# and needs to be rebuilt and validated on a Linux environment:
#
#   - generate-ebpf: regenerating vmlinux.h needs a working bpftool, but the
#     Azure runner kernel's linux-tools package does not ship a usable bpftool
#     binary (the /usr/sbin/bpftool wrapper cannot locate it). The committed
#     bpf_beekeeper_*_bpfel.go stubs let the rest of CI build and test without
#     this step.
#   - kernel-5-4 / kernel-5-15: the cilium/little-vm-helper nested-VM setup needs
#     a dated image tag (the rolling -main tag is mishandled by the action's
#     derive-image-name step), the required host-mount input, install-dependencies,
#     an in-VM Go toolchain, and KVM on the runner.
#
# TODO: rebuild these on a Linux runner where the toolchain can be validated,
# then re-add them to PR CI and to the branch ruleset's required checks.
#
# Trigger: manual only. They do NOT run on pull_request or push, so a known-broken
# toolchain cannot block merges while it is being rebuilt.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-ebpf:
    name: Regenerate vmlinux.h and run go generate (eBPF bytecode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install clang/llvm/libbpf/bpftool
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libelf-dev libbpf-dev linux-headers-$(uname -r) linux-tools-$(uname -r)
      - name: Regenerate vmlinux.h from the runner kernel BTF
        run: |
          # TODO: the Azure runner's linux-tools package does not provide a usable
          # bpftool binary; this needs a reliable bpftool on a Linux runner.
          test -r /sys/kernel/btf/vmlinux
          bpftool_bin=$(find /usr/lib -path '*linux-tools*/bpftool' -type f 2>/dev/null | head -1)
          test -n "$bpftool_bin" || { echo "::error::bpftool binary not found under /usr/lib"; exit 1; }
          "$bpftool_bin" btf dump file /sys/kernel/btf/vmlinux format c > internal/sentry/linux/bpf/vmlinux.h
      - name: Generate eBPF bytecode bindings
        run: go generate ./internal/sentry/linux/...
      - name: Build linux sentry package with generated bytecode
        run: go build -v ./internal/sentry/linux/...

  kernel-5-4:
    name: Sentry tier-2 degradation (kernel 5.4)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # TODO: rebuild the little-vm-helper invocation: use a dated image tag
      # instead of 5.4-main, add the required host-mount input, install-dependencies,
      # an in-VM Go toolchain, and confirm KVM is available on the runner.
      - uses: cilium/little-vm-helper@5ae749011735fd77f30f38add52f1a53a5568671 # v0.0.30
        with:
          image-version: "5.4-main"
          test-name: "sentry-tier2-degradation"
          cmd: |
            go test -v -tags linux -count=1 ./internal/sentry/... ./internal/ipc/... -run TestDegradationTier
            go test -v -tags linux -count=1 ./internal/sentry/linux/... -run TestProbeTier

  kernel-5-15:
    name: Sentry tier-0 full (kernel 5.15)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # TODO: rebuild the little-vm-helper invocation (see kernel-5-4).
      - uses: cilium/little-vm-helper@5ae749011735fd77f30f38add52f1a53a5568671 # v0.0.30
        with:
          image-version: "5.15-main"
          test-name: "sentry-tier0-full"
          cmd: |
            go test -v -tags linux -count=1 ./internal/sentry/... ./internal/ipc/... -run TestFullTier
            go test -v -tags linux -count=1 ./internal/sentry/linux/... -run TestProbeTier

# Release pipeline (SFDF-01 + SFDF-02 + SFDF-05)
#
# Triggered by pushing a vX.Y.Z tag. GoReleaser builds reproducible
# multi-platform binaries, cosign v3 keylessly signs checksums.txt, syft
# produces CycloneDX SBOMs per archive, and slsa-github-generator@v2.1.0
# produces an SLSA Level 3 provenance attestation tied to the GitHub Actions
# OIDC identity. No long-lived signing keys are used.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: write    # upload release artifacts
      id-token: write    # cosign keyless OIDC signing
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for changelog/version.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod # Pins the toolchain to go.mod for reproducibility.
          cache: false

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        id: run-goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate artifact hashes for SLSA provenance
        id: hash
        env:
          ARTIFACTS: "${{ steps.run-goreleaser.outputs.artifacts }}"
        run: |
          set -euo pipefail
          checksum_file=$(echo "$ARTIFACTS" | jq -r '.[] | select(.type=="Checksum") | .path')
          if [ -z "$checksum_file" ] || [ ! -f "$checksum_file" ]; then
            echo "::error::checksums.txt not found in GoReleaser artifacts"
            exit 1
          fi
          hashes=$(cat "$checksum_file" | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

  provenance:
    # SFDF-05: SLSA Level 3 provenance attestation via the slsa-github-generator
    # reusable workflow. The version MUST be pinned to a full semver per CLAUDE.md
    # and the SLSA framework's trusted-builder verification rules — never @v2.
    needs: [goreleaser]
    permissions:
      actions: read      # detect GitHub Actions environment for provenance
      id-token: write    # Sigstore OIDC signing for the attestation
      contents: write    # upload the .intoto.jsonl attestation to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      upload-assets: true

  publish:
    # Publish the draft release only AFTER provenance has been attached. GoReleaser
    # creates the release as a draft (.goreleaser.yaml release.draft: true) so every
    # asset, including the SLSA provenance from the provenance job, is in place
    # before the release is published. This is required for GitHub immutable
    # releases: a published (immutable) release cannot receive new assets. If
    # provenance fails this job does not run, so the release stays a draft rather
    # than publishing incomplete.
    needs: [goreleaser, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write # flip the draft release to published
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Publish the draft release
        # Tag and repo are passed via env (not interpolated into the run script) to
        # avoid template injection from a tag-controlled github.ref_name.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false

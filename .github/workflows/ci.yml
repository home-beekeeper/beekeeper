name: CI

on:
  pull_request:
  push:
    branches: [main]

# Default the GITHUB_TOKEN to read-only. This CI workflow only reads the repo,
# so no job needs write scopes; any future job that does must elevate explicitly
# at the job level with the narrowest permission required.
permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      # BKINT-02: install the Pollen binary at the pinned version so that
      # inventory/scan tests (TestScanWithBumblebee, TestScanWindowsShapedRecord,
      # TestScanPollenUnavailable, TestPollenCompatibility) have pollen on PATH.
      # The pinned version is recorded in internal/scan/pollen_version.go as
      # PinnedPollenVersion (source of truth — keep in sync with this step).
      # NOTE: install from github.com/bantuson/pollen, the module path the pollen
      # v0.2.0 tag's go.mod actually declares. The repo was moved to the
      # home-beekeeper org, but the v0.2.0 tag's go.mod still declares
      # github.com/bantuson/pollen, so installing from .../home-beekeeper/pollen
      # fails with a module-path mismatch. To move this to the org path, re-tag
      # home-beekeeper/pollen with a corrected go.mod module declaration.
      - name: Install Pollen (BKINT-02 — pinned binary for inventory tests)
        run: go install github.com/bantuson/pollen/cmd/pollen@v0.2.0

      # NOTE: eBPF bytecode generation (go generate ./internal/sentry/linux/...)
      # is intentionally NOT run here. The committed bpf_beekeeper_*_bpfel.go
      # bindings compile on every OS (the loaders fail closed when the embedded
      # bytecode is absent), so the cross-platform build and unit tests do not
      # need the eBPF toolchain. Real bytecode generation and the kernel-VM probe
      # tests live in .github/workflows/ebpf-kernel.yml (manual trigger) until the
      # Linux-only toolchain is rebuilt and validated on a Linux runner (TODO).

      - name: Build
        run: go build -v -trimpath -buildvcs=false ./...

      # VAL-03: gate cross-compilation of all 3 GOOS (build-only). GOOS=linux
      # builds the sentry/linux package against the committed stub bindings while
      # GOOS=darwin/windows build their platform files. Pure-Go cross-builds
      # (CGO off) — eslogger/ETW have no cgo deps.
      - name: Cross-compile (3 GOOS, build-only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for os in linux darwin windows; do
            echo "GOOS=$os go build ./..."
            GOOS=$os go build -trimpath -buildvcs=false ./...
          done

      - name: Test
        run: go test -v -race ./...
        env:
          CGO_ENABLED: 1 # the race detector requires CGO

      - name: Vet
        run: go vet ./...

      - name: Check go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  fuzz:
    # Phase 2 release gate (CLAUDE.md §Self-Defense Non-Negotiables): fuzz the
    # policy engine (FuzzEvaluate) and catalog parser (FuzzParseCatalogFile)
    # with bounded fuzztime. A discovered crash fails the pipeline before release.
    # Phase 4 adds the MCP message parser fuzz gate.
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz policy engine (FuzzEvaluate)
        run: go test -tags fuzz -run FuzzEvaluate -fuzz FuzzEvaluate -fuzztime 30s ./internal/policy/

      - name: Fuzz catalog parser (FuzzParseCatalogFile)
        run: go test -tags fuzz -run FuzzParseCatalogFile -fuzz FuzzParseCatalogFile -fuzztime 30s ./internal/catalog/

  fuzz-ipc:
    runs-on: ubuntu-22.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz IPC message parser (FuzzIPCMessage)
        run: go test -tags fuzz -run FuzzIPCMessage -fuzz FuzzIPCMessage -fuzztime 30s ./internal/ipc/...

  fuzz-llamafirewall:
    # Phase 6 release gate (LLMF-05): fuzz the LlamaFirewall IPC protocol framing.
    # FuzzLlamaFirewallProto must pass before any v0.6.0 release tag.
    runs-on: ubuntu-22.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Smoke fuzz LlamaFirewall IPC
        run: go test -run FuzzLlamaFirewallProto -fuzztime=5s ./internal/llamafirewall/...

  fuzz-sentry:
    # Phase 21 release gate (VAL-04): fuzz the Sentry rule evaluator
    # (FuzzEvaluateEvent). The evaluator is pure (TestRulesImportsArePure); a
    # discovered panic or out-of-contract severity blocks release.
    runs-on: ubuntu-22.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz Sentry rule evaluator (FuzzEvaluateEvent)
        run: go test -tags fuzz -run FuzzEvaluateEvent -fuzz FuzzEvaluateEvent -fuzztime 30s ./internal/sentry/

  # The kernel-VM probe tests (test-sentry-kernel-5-4 / -5-15) moved to
  # .github/workflows/ebpf-kernel.yml. They require a nested-VM (little-vm-helper)
  # setup that needs a rebuild on a Linux runner, so they no longer block PR CI.

  test-eslogger-fields:
    # Phase 7 release gate (SMAC-02 + CLAUDE.md research note): validate that
    # the eslogger NDJSON parser's field paths match the actual schema emitted
    # by eslogger on a current macOS. Without this gate, the parser could
    # silently produce empty SentryEvents in production (Apple does not provide
    # a stable schema guarantee — fields may change across OS minor versions).
    runs-on: macos-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture live eslogger output
        shell: bash
        run: |
          set -euo pipefail
          FIXTURE=$(mktemp -t eslogger.XXXXXX.ndjson)
          # Background eslogger; CI runners support `sudo -n` (passwordless sudo).
          sudo -n eslogger exec open create network_flow fork > "$FIXTURE" 2>/dev/null &
          ESLPID=$!
          # Generate predictable process activity so we capture at least one exec event.
          sleep 1
          for i in 1 2 3 4 5; do
            /bin/echo "warmup $i" > /dev/null
            /usr/bin/whoami > /dev/null
            sleep 0.2
          done
          sleep 1
          sudo -n kill "$ESLPID" 2>/dev/null || true
          wait "$ESLPID" 2>/dev/null || true
          echo "BEEKEEPER_ESLOGGER_FIXTURE=$FIXTURE" >> "$GITHUB_ENV"
          echo "Captured $(wc -l < "$FIXTURE") lines to $FIXTURE"
          head -1 "$FIXTURE" | head -c 200 || true
      - name: Validate parser against live eslogger output
        run: go test -tags darwin -count=1 -v -run TestEsloggerFieldValidation ./internal/sentry/darwin/

  coverage-floor:
    # Statement-coverage FLOOR gate (internal/coveragegate/floor.go): the
    # complement to the linkage gate (TestCoverageManifest). Linkage proves every
    # production file is accounted; the floor proves the package-tested packages
    # do not silently regress below their per-package minimum. Runs on the
    # canonical Linux runner; OS-bound / e2e packages are reason-coded exempt in
    # floor.go (their real coverage is validated by the matrix + -tags e2e jobs).
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      # Inventory/scan tests need the pinned Pollen binary on PATH (see the test
      # job's note); without it those packages' coverage would be understated.
      - name: Install Pollen (pinned binary for inventory tests)
        run: go install github.com/bantuson/pollen/cmd/pollen@v0.2.0
      - name: Generate coverprofile
        run: go test ./... -coverprofile=coverage.out -covermode=set
      - name: Enforce statement-coverage floor
        run: BEEKEEPER_COVERPROFILE=coverage.out go test ./internal/coveragegate -run TestCoverageFloor -count=1 -v

  release-gate:
    runs-on: ubuntu-22.04
    needs: [fuzz, fuzz-ipc, fuzz-llamafirewall, fuzz-sentry, test-eslogger-fields, coverage-floor]
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - run: echo "All release gates passed"

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v -trimpath -buildvcs=false ./...

      - name: Test
        run: go test -v -race ./...
        env:
          CGO_ENABLED: 1 # the race detector requires CGO

      - name: Vet
        run: go vet ./...

      - name: Check go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

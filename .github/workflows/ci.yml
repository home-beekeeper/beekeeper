name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      # BKINT-02: install the Pollen binary at the pinned version so that
      # inventory/scan tests (TestScanWithBumblebee, TestScanWindowsShapedRecord,
      # TestScanPollenUnavailable, TestPollenCompatibility) have pollen on PATH.
      # The pinned version is recorded in internal/scan/pollen_version.go as
      # PinnedPollenVersion (source of truth — keep in sync with this step).
      # NOTE: Pollen must be pushed + tagged on github.com/home-beekeeper/pollen BEFORE
      # beekeeper CI runs this step (Pitfall 3, 05-RESEARCH.md). This step is local
      # prep; CI resolves it after the plan-05 checkpoint push.
      - name: Install Pollen (BKINT-02 — pinned binary for inventory tests)
        run: go install github.com/home-beekeeper/pollen/cmd/pollen@v0.2.0

      - name: Install clang/llvm/libbpf for eBPF bytecode generation (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang llvm libelf-dev libbpf-dev linux-headers-$(uname -r) bpftool

      - name: Generate eBPF bytecode bindings (Linux only)
        if: runner.os == 'Linux'
        run: go generate ./internal/sentry/linux/...

      - name: Build
        run: go build -v -trimpath -buildvcs=false ./...

      # VAL-03: gate cross-compilation of all 3 GOOS (build-only). Run on the
      # Linux leg, where eBPF bytecode has been generated above, so GOOS=linux
      # builds the real sentry/linux package while GOOS=darwin/windows build
      # their platform files. Pure-Go cross-builds (CGO off) — eslogger/ETW have
      # no cgo deps.
      - name: Cross-compile (3 GOOS, build-only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          for os in linux darwin windows; do
            echo "GOOS=$os go build ./..."
            GOOS=$os go build -trimpath -buildvcs=false ./...
          done

      - name: Test
        run: go test -v -race ./...
        env:
          CGO_ENABLED: 1 # the race detector requires CGO

      - name: Vet
        run: go vet ./...

      - name: Check go.mod/go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  fuzz:
    # Phase 2 release gate (CLAUDE.md §Self-Defense Non-Negotiables): fuzz the
    # policy engine (FuzzEvaluate) and catalog parser (FuzzParseCatalogFile)
    # with bounded fuzztime. A discovered crash fails the pipeline before release.
    # Phase 4 adds the MCP message parser fuzz gate.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz policy engine (FuzzEvaluate)
        run: go test -tags fuzz -run FuzzEvaluate -fuzz FuzzEvaluate -fuzztime 30s ./internal/policy/

      - name: Fuzz catalog parser (FuzzParseCatalogFile)
        run: go test -tags fuzz -run FuzzParseCatalogFile -fuzz FuzzParseCatalogFile -fuzztime 30s ./internal/catalog/

  fuzz-ipc:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz IPC message parser (FuzzIPCMessage)
        run: go test -tags fuzz -run FuzzIPCMessage -fuzz FuzzIPCMessage -fuzztime 30s ./internal/ipc/...

  fuzz-llamafirewall:
    # Phase 6 release gate (LLMF-05): fuzz the LlamaFirewall IPC protocol framing.
    # FuzzLlamaFirewallProto must pass before any v0.6.0 release tag.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Smoke fuzz LlamaFirewall IPC
        run: go test -run FuzzLlamaFirewallProto -fuzztime=5s ./internal/llamafirewall/...

  fuzz-sentry:
    # Phase 21 release gate (VAL-04): fuzz the Sentry rule evaluator
    # (FuzzEvaluateEvent). The evaluator is pure (TestRulesImportsArePure); a
    # discovered panic or out-of-contract severity blocks release.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz Sentry rule evaluator (FuzzEvaluateEvent)
        run: go test -tags fuzz -run FuzzEvaluateEvent -fuzz FuzzEvaluateEvent -fuzztime 30s ./internal/sentry/

  test-sentry-kernel-5-4:
    runs-on: ubuntu-22.04
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: cilium/little-vm-helper@v0.0.21
        with:
          image-version: "5.4-main"
          test-name: "sentry-tier2-degradation"
          cmd: |
            go test -v -tags linux -count=1 ./internal/sentry/... ./internal/ipc/... -run TestDegradationTier
            go test -v -tags linux -count=1 ./internal/sentry/linux/... -run TestProbeTier

  test-sentry-kernel-5-15:
    runs-on: ubuntu-22.04
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: cilium/little-vm-helper@v0.0.21
        with:
          image-version: "5.15-main"
          test-name: "sentry-tier0-full"
          cmd: |
            go test -v -tags linux -count=1 ./internal/sentry/... ./internal/ipc/... -run TestFullTier
            go test -v -tags linux -count=1 ./internal/sentry/linux/... -run TestProbeTier

  test-eslogger-fields:
    # Phase 7 release gate (SMAC-02 + CLAUDE.md research note): validate that
    # the eslogger NDJSON parser's field paths match the actual schema emitted
    # by eslogger on a current macOS. Without this gate, the parser could
    # silently produce empty SentryEvents in production (Apple does not provide
    # a stable schema guarantee — fields may change across OS minor versions).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture live eslogger output
        shell: bash
        run: |
          set -euo pipefail
          FIXTURE=$(mktemp -t eslogger.XXXXXX.ndjson)
          # Background eslogger; CI runners support `sudo -n` (passwordless sudo).
          sudo -n eslogger exec open create network_flow fork > "$FIXTURE" 2>/dev/null &
          ESLPID=$!
          # Generate predictable process activity so we capture at least one exec event.
          sleep 1
          for i in 1 2 3 4 5; do
            /bin/echo "warmup $i" > /dev/null
            /usr/bin/whoami > /dev/null
            sleep 0.2
          done
          sleep 1
          sudo -n kill "$ESLPID" 2>/dev/null || true
          wait "$ESLPID" 2>/dev/null || true
          echo "BEEKEEPER_ESLOGGER_FIXTURE=$FIXTURE" >> "$GITHUB_ENV"
          echo "Captured $(wc -l < "$FIXTURE") lines to $FIXTURE"
          head -1 "$FIXTURE" | head -c 200 || true
      - name: Validate parser against live eslogger output
        run: go test -tags darwin -count=1 -v -run TestEsloggerFieldValidation ./internal/sentry/darwin/

  release-gate:
    runs-on: ubuntu-22.04
    needs: [test-sentry-kernel-5-4, test-sentry-kernel-5-15, fuzz-ipc, fuzz-llamafirewall, test-eslogger-fields, fuzz-sentry]
    steps:
      - run: echo "All release gates passed"
